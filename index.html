<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
  >

  <title>Data Matrix High-Resolution Test v003</title>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background: #f2f2f2;
      color: #111;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px 0;
    }

    .box {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.18);
    }

    button {
      width: 100%;
      font-size: 20px;
      padding: 14px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
    }

    button.secondary {
      background: #555;
    }

    #reader {
      width: 100%;
      max-width: 900px;
      margin: auto;
    }

    #reader video {
      width: 100% !important;
      height: auto !important;
    }

    .ok {
      color: green;
      font-weight: bold;
      font-size: 22px;
    }

    .fail {
      color: #b00020;
      font-weight: bold;
      font-size: 22px;
    }

    .label {
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      color: #333;
    }

    .value {
      font-size: 32px;
      font-weight: bold;
      color: #003366;
      word-break: break-word;
    }

    .small {
      font-size: 14px;
      line-height: 1.4;
      color: #444;
      word-break: break-word;
    }

    code {
      background: #eee;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h1>Data Matrix High-Resolution Test v003</h1>

  <div class="box">
    <div id="status" class="small">Checking browser...</div>
  </div>

  <div class="box">
    <div class="small">
      Current goal only: scan a small <b>Data Matrix</b> containing <code>CS12341</code>.
      No Apps Script is used on this page.
    </div>

    <button onclick="startScanner()">Start High-Resolution Data Matrix Scanner</button>
    <button class="secondary" onclick="stopScanner()">Stop Scanner</button>
    <button class="secondary" onclick="tryZoomIn()">Try Zoom In</button>
    <button class="secondary" onclick="tryTorch()">Try Torch / Light</button>
  </div>

  <div class="box">
    <div id="reader"></div>
  </div>

  <div class="box">
    <div class="label">Scan result</div>
    <div id="scanResult" class="value">Nothing scanned yet.</div>

    <div class="label">Scanner status</div>
    <div id="scannerStatus" class="small">Not started.</div>
  </div>

  <div class="box">
    <div class="label">Technical log</div>
    <div id="log" class="small"></div>
  </div>

  <script>
    let scanner = null;
    let scannerRunning = false;
    let lastZoomValue = null;
    let scanCount = 0;

    const statusEl = document.getElementById("status");
    const scanResultEl = document.getElementById("scanResult");
    const scannerStatusEl = document.getElementById("scannerStatus");
    const logEl = document.getElementById("log");

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += "[" + time + "] " + escapeHtml(message) + "<br>";
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function precheck() {
      log("URL: " + window.location.href);
      log("Protocol: " + window.location.protocol);
      log("Secure context: " + String(window.isSecureContext));
      log("User agent: " + navigator.userAgent);

      if (window.location.protocol !== "https:") {
        statusEl.innerHTML = '<div class="fail">FAIL: Page is not HTTPS.</div>';
        return false;
      }

      if (!window.isSecureContext) {
        statusEl.innerHTML = '<div class="fail">FAIL: Browser does not consider this page secure.</div>';
        return false;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        statusEl.innerHTML = '<div class="fail">FAIL: Browser camera API is not available.</div>';
        return false;
      }

      if (typeof Html5Qrcode === "undefined") {
        statusEl.innerHTML = '<div class="fail">FAIL: html5-qrcode did not load.</div>';
        return false;
      }

      if (typeof Html5QrcodeSupportedFormats === "undefined") {
        statusEl.innerHTML = '<div class="fail">FAIL: Html5QrcodeSupportedFormats did not load.</div>';
        return false;
      }

      statusEl.innerHTML =
        '<div class="ok">PASS: Browser and html5-qrcode loaded.</div>' +
        '<div class="small">Press Start High-Resolution Data Matrix Scanner.</div>';

      return true;
    }

    async function startScanner() {
      if (!precheck()) return;

      scanResultEl.textContent = "Starting camera...";
      scannerStatusEl.textContent = "Starting scanner...";
      scanCount = 0;
      lastZoomValue = null;

      try {
        if (!scanner) {
          scanner = new Html5Qrcode(
            "reader",
            {
              formatsToSupport: [
                Html5QrcodeSupportedFormats.DATA_MATRIX
              ],
              useBarCodeDetectorIfSupported: false,
              verbose: false
            }
          );

          log("Created scanner: DATA_MATRIX only. Native BarcodeDetector disabled.");
        }

        const config = {
          fps: 30,

          /*
            Use almost the whole camera view.
            Small Data Matrix symbols should not be forced into a tiny 250x250 box.
          */
          qrbox: function(viewfinderWidth, viewfinderHeight) {
            const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
            const edge = Math.floor(minEdge * 0.98);
            return {
              width: edge,
              height: edge
            };
          },

          disableFlip: true,

          /*
            High-resolution request. These are ideal constraints.
            The browser may still provide lower resolution; the actual value is logged.
          */
          videoConstraints: {
            facingMode: { ideal: "environment" },
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            frameRate: { ideal: 30 },
            resizeMode: "none"
          }
        };

        await scanner.start(
          { facingMode: { ideal: "environment" } },
          config,
          onScanSuccess,
          onScanFailure
        );

        scannerRunning = true;

        scanResultEl.textContent = "Camera running. Aim at Data Matrix.";
        scannerStatusEl.textContent = "Scanning Data Matrix only.";

        log("Scanner started.");

        logActualCameraSettings();
        tryContinuousFocus();

      } catch (error) {
        scanResultEl.textContent = "Scanner failed.";
        scannerStatusEl.innerHTML =
          '<div class="fail">' + escapeHtml(String(error)) + '</div>';
        log("Scanner start error: " + String(error));
      }
    }

    function onScanSuccess(decodedText, decodedResult) {
      const value = String(decodedText || "").trim();

      if (!value) return;

      scanCount += 1;

      scanResultEl.textContent = value;
      scannerStatusEl.innerHTML =
        '<div class="ok">SUCCESS: Data Matrix scanned.</div>' +
        '<div class="small">Scan count: ' + scanCount + '</div>';

      log("SCAN SUCCESS: " + value);

      /*
        Stop after first valid scan.
        For repeated testing, press Start again.
      */
      stopScanner();
    }

    function onScanFailure(errorMessage) {
      /*
        Expected while searching. Do not log continuously.
      */
    }

    async function stopScanner() {
      if (!scanner || !scannerRunning) {
        scannerStatusEl.textContent = "Scanner is not running.";
        return;
      }

      try {
        await scanner.stop();
        scannerRunning = false;
        scannerStatusEl.textContent = "Scanner stopped.";
        log("Scanner stopped.");
      } catch (error) {
        log("Stop scanner error: " + String(error));
      }
    }

    function logActualCameraSettings() {
      try {
        const settings = scanner.getRunningTrackSettings();
        log("ACTUAL CAMERA SETTINGS: " + JSON.stringify(settings));

        if (settings.width && settings.height) {
          statusEl.innerHTML =
            '<div class="ok">Camera active.</div>' +
            '<div class="small">Actual stream: <b>' +
            escapeHtml(settings.width + " × " + settings.height) +
            '</b></div>';
        }
      } catch (error) {
        log("Could not read actual camera settings: " + String(error));
      }

      try {
        const capabilities = scanner.getRunningTrackCapabilities();
        log("CAMERA CAPABILITIES: " + JSON.stringify(capabilities));
      } catch (error) {
        log("Could not read camera capabilities: " + String(error));
      }
    }

    async function tryContinuousFocus() {
      if (!scanner || !scannerRunning) {
        log("Continuous focus skipped: scanner not running.");
        return;
      }

      try {
        await scanner.applyVideoConstraints({
          advanced: [
            { focusMode: "continuous" }
          ]
        });

        log("Requested continuous focus.");
      } catch (error) {
        log("Continuous focus not applied: " + String(error));
      }
    }

    async function tryZoomIn() {
      if (!scanner || !scannerRunning) {
        log("Zoom requested but scanner is not running.");
        return;
      }

      try {
        const capabilities = scanner.getRunningTrackCapabilities();

        if (!capabilities || !capabilities.zoom) {
          log("Zoom not exposed by this browser/camera.");
          return;
        }

        const minZoom = capabilities.zoom.min || 1;
        const maxZoom = capabilities.zoom.max || 1;
        const step = capabilities.zoom.step || 0.1;

        if (lastZoomValue === null) {
          lastZoomValue = Math.min(maxZoom, Math.max(minZoom, 2));
        } else {
          lastZoomValue = Math.min(maxZoom, lastZoomValue + step * 5);
        }

        await scanner.applyVideoConstraints({
          advanced: [
            { zoom: lastZoomValue }
          ]
        });

        log("Applied zoom: " + lastZoomValue + " / max " + maxZoom);
        logActualCameraSettings();

      } catch (error) {
        log("Zoom request failed: " + String(error));
      }
    }

    async function tryTorch() {
      if (!scanner || !scannerRunning) {
        log("Torch requested but scanner is not running.");
        return;
      }

      try {
        const capabilities = scanner.getRunningTrackCapabilities();

        if (!capabilities || !capabilities.torch) {
          log("Torch not exposed by this browser/camera.");
          return;
        }

        await scanner.applyVideoConstraints({
          advanced: [
            { torch: true }
          ]
        });

        log("Torch requested ON.");
      } catch (error) {
        log("Torch request failed: " + String(error));
      }
    }

    precheck();

    window.startScanner = startScanner;
    window.stopScanner = stopScanner;
    window.tryZoomIn = tryZoomIn;
    window.tryTorch = tryTorch;
  </script>
</body>
</html>
