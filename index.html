<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
  >

  <title>High-Resolution Data Matrix Test</title>

  <!-- Fallback only. Native BarcodeDetector is tried first. -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background: #f2f2f2;
      color: #111;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px 0;
    }

    .box {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.18);
    }

    button {
      width: 100%;
      font-size: 20px;
      padding: 14px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
    }

    button.secondary {
      background: #555;
    }

    video {
      width: 100%;
      max-width: 900px;
      background: black;
      border-radius: 10px;
      display: block;
      margin: auto;
    }

    #reader {
      width: 100%;
      max-width: 900px;
      margin: auto;
    }

    .ok {
      color: green;
      font-weight: bold;
      font-size: 22px;
    }

    .fail {
      color: #b00020;
      font-weight: bold;
      font-size: 22px;
    }

    .label {
      font-weight: bold;
      font-size: 16px;
      margin-top: 12px;
      color: #333;
    }

    .value {
      font-size: 30px;
      font-weight: bold;
      color: #003366;
      word-break: break-word;
    }

    .small {
      font-size: 14px;
      line-height: 1.4;
      color: #444;
      word-break: break-word;
    }

    code {
      background: #eee;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h1>High-Resolution Data Matrix Test</h1>

  <div class="box">
    <div id="status" class="small">Checking browser...</div>
  </div>

  <div class="box">
    <div class="small">
      Goal: scan a small <b>Data Matrix</b> containing only <code>CS12341</code>.
      This page does not contact Google Apps Script.
    </div>

    <button onclick="startNativeScanner()">Start Native High-Resolution Scanner</button>
    <button class="secondary" onclick="stopNativeScanner()">Stop Native Scanner</button>
    <button class="secondary" onclick="tryZoomIn()">Try Zoom In</button>
    <button class="secondary" onclick="tryTorch()">Try Torch / Light</button>
    <button class="secondary" onclick="startHtml5Fallback()">Fallback: html5-qrcode Scanner</button>
  </div>

  <div class="box">
    <video id="video" playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="reader" style="display:none;"></div>
  </div>

  <div class="box">
    <div class="label">Scan result</div>
    <div id="scanResult" class="value">Nothing scanned yet.</div>

    <div class="label">Scanner mode</div>
    <div id="scannerMode" class="small">None yet.</div>
  </div>

  <div class="box">
    <div class="label">Technical log</div>
    <div id="log" class="small"></div>
  </div>

  <script>
    let stream = null;
    let videoTrack = null;
    let detector = null;
    let nativeScanning = false;
    let lastZoomValue = null;

    let html5Scanner = null;
    let html5Running = false;

    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("scanResult");
    const modeEl = document.getElementById("scannerMode");
    const logEl = document.getElementById("log");
    const videoEl = document.getElementById("video");
    const canvasEl = document.getElementById("canvas");
    const readerEl = document.getElementById("reader");

    function log(message) {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += "[" + time + "] " + escapeHtml(message) + "<br>";
    }

    function setStatus(html) {
      statusEl.innerHTML = html;
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function precheck() {
      log("URL: " + window.location.href);
      log("Protocol: " + window.location.protocol);
      log("Secure context: " + String(window.isSecureContext));
      log("User agent: " + navigator.userAgent);

      if (window.location.protocol !== "https:") {
        setStatus('<div class="fail">FAIL: Page is not HTTPS.</div>');
        return false;
      }

      if (!window.isSecureContext) {
        setStatus('<div class="fail">FAIL: Browser does not consider this page secure.</div>');
        return false;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('<div class="fail">FAIL: Browser camera API is not available.</div>');
        return false;
      }

      let nativeSupported = false;

      if ("BarcodeDetector" in window) {
        try {
          const formats = await BarcodeDetector.getSupportedFormats();
          log("Native BarcodeDetector supported formats: " + JSON.stringify(formats));

          nativeSupported =
            formats.includes("data_matrix") ||
            formats.includes("datamatrix") ||
            formats.includes("dataMatrix");

          if (nativeSupported) {
            setStatus(
              '<div class="ok">PASS: Native Data Matrix detector is available.</div>' +
              '<div class="small">Use Start Native High-Resolution Scanner first.</div>'
            );
          } else {
            setStatus(
              '<div class="fail">Native BarcodeDetector exists, but Data Matrix is not listed.</div>' +
              '<div class="small">Use fallback scanner, but performance may be weaker.</div>'
            );
          }
        } catch (error) {
          log("Could not read BarcodeDetector supported formats: " + String(error));
          setStatus(
            '<div class="fail">BarcodeDetector check failed.</div>' +
            '<div class="small">Use fallback scanner.</div>'
          );
        }
      } else {
        log("BarcodeDetector is not available in this browser.");
        setStatus(
          '<div class="fail">Native BarcodeDetector is not available.</div>' +
          '<div class="small">Use fallback scanner. If fallback fails on tiny Data Matrix, browser native support is likely the limiting issue.</div>'
        );
      }

      return true;
    }

    async function startNativeScanner() {
      await stopHtml5Fallback();
      await stopNativeScanner();

      const ok = await precheck();
      if (!ok) return;

      if (!("BarcodeDetector" in window)) {
        resultEl.textContent = "Native BarcodeDetector unavailable.";
        modeEl.textContent = "Native scanner unavailable.";
        return;
      }

      try {
        const formats = await BarcodeDetector.getSupportedFormats();
        const supportsDataMatrix = formats.includes("data_matrix");

        if (!supportsDataMatrix) {
          resultEl.textContent = "Native Data Matrix not supported by this browser.";
          modeEl.textContent = "Native scanner unavailable for Data Matrix.";
          log("Native detector does not support data_matrix.");
          return;
        }

        detector = new BarcodeDetector({
          formats: ["data_matrix"]
        });

        /*
          High-resolution request.
          These are ideal constraints. The browser decides what it actually gives.
        */
        const constraints = {
          audio: false,
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            frameRate: { ideal: 30 },
            resizeMode: "none"
          }
        };

        log("Requesting high-resolution camera stream: " + JSON.stringify(constraints));

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        videoTrack = stream.getVideoTracks()[0];

        videoEl.srcObject = stream;
        videoEl.style.display = "block";
        readerEl.style.display = "none";

        await videoEl.play();

        logTrackSettingsAndCapabilities();

        nativeScanning = true;
        resultEl.textContent = "Camera running. Aim at Data Matrix.";
        modeEl.textContent = "Native BarcodeDetector, Data Matrix only, full-frame canvas scanning.";

        await tryContinuousFocus();

        scanNativeLoop();

      } catch (error) {
        resultEl.textContent = "Native scanner failed.";
        modeEl.textContent = "Error.";
        log("Native scanner error: " + String(error));
      }
    }

    async function scanNativeLoop() {
      if (!nativeScanning || !detector) return;

      try {
        if (videoEl.readyState >= 2 && videoEl.videoWidth > 0 && videoEl.videoHeight > 0) {
          const canvas = canvasEl;
          const ctx = canvas.getContext("2d", { willReadFrequently: true });

          /*
            Critical: use the actual camera frame size.
            Do not downsample to the displayed phone-screen size.
          */
          canvas.width = videoEl.videoWidth;
          canvas.height = videoEl.videoHeight;

          ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);

          const barcodes = await detector.detect(canvas);

          if (barcodes && barcodes.length > 0) {
            const first = barcodes[0];
            const value = String(first.rawValue || "").trim();

            if (value) {
              resultEl.textContent = value;
              modeEl.textContent = "SUCCESS: Native Data Matrix detected.";
              log("NATIVE SCAN SUCCESS: " + value);
              log("Barcode details: " + JSON.stringify(first));

              nativeScanning = false;
              return;
            }
          }
        }
      } catch (error) {
        log("Native detect loop error: " + String(error));
      }

      /*
        Scan again quickly.
        requestAnimationFrame uses the browser rendering loop.
      */
      if (nativeScanning) {
        requestAnimationFrame(scanNativeLoop);
      }
    }

    async function stopNativeScanner() {
      nativeScanning = false;

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
        videoTrack = null;
      }

      videoEl.srcObject = null;
      resultEl.textContent = "Native scanner stopped.";
      modeEl.textContent = "Stopped.";
      log("Native scanner stopped.");
    }

    function logTrackSettingsAndCapabilities() {
      if (!videoTrack) {
        log("No video track available.");
        return;
      }

      try {
        const settings = videoTrack.getSettings();
        log("ACTUAL CAMERA SETTINGS: " + JSON.stringify(settings));

        if (settings.width && settings.height) {
          setStatus(
            '<div class="ok">Camera active.</div>' +
            '<div class="small">Actual stream: <b>' +
            escapeHtml(settings.width + " × " + settings.height) +
            '</b>. If this is low, browser is not giving high resolution.</div>'
          );
        }
      } catch (error) {
        log("Could not read track settings: " + String(error));
      }

      try {
        const capabilities = videoTrack.getCapabilities();
        log("CAMERA CAPABILITIES: " + JSON.stringify(capabilities));
      } catch (error) {
        log("Could not read track capabilities: " + String(error));
      }
    }

    async function tryContinuousFocus() {
      if (!videoTrack) {
        log("Continuous focus requested but no video track exists.");
        return;
      }

      try {
        await videoTrack.applyConstraints({
          advanced: [
            { focusMode: "continuous" }
          ]
        });

        log("Requested continuous focus.");
      } catch (error) {
        log("Continuous focus not applied: " + String(error));
      }
    }

    async function tryZoomIn() {
      if (!videoTrack) {
        log("Zoom requested but no video track exists.");
        return;
      }

      try {
        const capabilities = videoTrack.getCapabilities();

        if (!capabilities.zoom) {
          log("Zoom is not exposed by this browser/camera.");
          return;
        }

        const minZoom = capabilities.zoom.min || 1;
        const maxZoom = capabilities.zoom.max || 1;
        const step = capabilities.zoom.step || 0.1;

        if (lastZoomValue === null) {
          lastZoomValue = Math.min(maxZoom, Math.max(minZoom, 2));
        } else {
          lastZoomValue = Math.min(maxZoom, lastZoomValue + step * 5);
        }

        await videoTrack.applyConstraints({
          advanced: [
            { zoom: lastZoomValue }
          ]
        });

        log("Applied zoom: " + lastZoomValue + " / max " + maxZoom);
        logTrackSettingsAndCapabilities();

      } catch (error) {
        log("Zoom request failed: " + String(error));
      }
    }

    async function tryTorch() {
      if (!videoTrack) {
        log("Torch requested but no video track exists.");
        return;
      }

      try {
        const capabilities = videoTrack.getCapabilities();

        if (!capabilities.torch) {
          log("Torch is not exposed by this browser/camera.");
          return;
        }

        await videoTrack.applyConstraints({
          advanced: [
            { torch: true }
          ]
        });

        log("Torch requested ON.");
      } catch (error) {
        log("Torch request failed: " + String(error));
      }
    }

    async function startHtml5Fallback() {
      await stopNativeScanner();

      const ok = await precheck();
      if (!ok) return;

      videoEl.style.display = "none";
      readerEl.style.display = "block";

      resultEl.textContent = "Starting fallback scanner...";
      modeEl.textContent = "html5-qrcode fallback.";

      try {
        if (!html5Scanner) {
          html5Scanner = new Html5Qrcode(
            "reader",
            {
              formatsToSupport: [
                Html5QrcodeSupportedFormats.DATA_MATRIX
              ],
              useBarCodeDetectorIfSupported: true,
              verbose: false
            }
          );
        }

        const config = {
          fps: 30,
          qrbox: function(viewfinderWidth, viewfinderHeight) {
            const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
            const edge = Math.floor(minEdge * 0.95);
            return {
              width: edge,
              height: edge
            };
          },
          disableFlip: true,
          videoConstraints: {
            facingMode: { ideal: "environment" },
            width: { ideal: 3840 },
            height: { ideal: 2160 },
            frameRate: { ideal: 30 },
            resizeMode: "none"
          }
        };

        await html5Scanner.start(
          { facingMode: { ideal: "environment" } },
          config,
          function(decodedText) {
            const value = String(decodedText || "").trim();

            if (value) {
              resultEl.textContent = value;
              modeEl.textContent = "SUCCESS: html5-qrcode fallback detected Data Matrix.";
              log("HTML5 FALLBACK SCAN SUCCESS: " + value);
              stopHtml5Fallback();
            }
          },
          function(errorMessage) {
            // Routine failures while searching. Do not log.
          }
        );

        html5Running = true;
        resultEl.textContent = "Fallback scanner running. Aim at Data Matrix.";

        try {
          const settings = html5Scanner.getRunningTrackSettings();
          log("HTML5 FALLBACK ACTUAL CAMERA SETTINGS: " + JSON.stringify(settings));
        } catch (error) {
          log("Could not read html5 fallback camera settings: " + String(error));
        }

      } catch (error) {
        resultEl.textContent = "Fallback scanner failed.";
        modeEl.textContent = "html5-qrcode fallback error.";
        log("HTML5 fallback error: " + String(error));
      }
    }

    async function stopHtml5Fallback() {
      if (html5Scanner && html5Running) {
        try {
          await html5Scanner.stop();
          html5Running = false;
          log("html5-qrcode fallback stopped.");
        } catch (error) {
          log("Could not stop html5 fallback: " + String(error));
        }
      }
    }

    precheck();

    window.startNativeScanner = startNativeScanner;
    window.stopNativeScanner = stopNativeScanner;
    window.tryZoomIn = tryZoomIn;
    window.tryTorch = tryTorch;
    window.startHtml5Fallback = startHtml5Fallback;
  </script>
</body>
</html>
