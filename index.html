<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cryovial Barcode Camera Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f2f2f2;
      color: #111;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 12px 0;
    }

    .box {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.18);
    }

    button {
      width: 100%;
      font-size: 22px;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
    }

    button.secondary {
      background: #555;
    }

    #reader {
      width: 100%;
      max-width: 430px;
      margin: auto;
    }

    .pass {
      color: green;
      font-weight: bold;
      font-size: 22px;
    }

    .fail {
      color: #b00020;
      font-weight: bold;
      font-size: 22px;
    }

    .result {
      font-size: 30px;
      font-weight: bold;
      color: #003366;
      word-break: break-word;
    }

    .small {
      font-size: 14px;
      color: #444;
      line-height: 1.4;
    }

    .label {
      font-weight: bold;
      margin-top: 8px;
    }

    code {
      background: #eee;
      padding: 2px 5px;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <h1>Cryovial Barcode Camera Test</h1>

  <div class="box">
    <div id="systemCheck">
      Checking browser and HTTPS status...
    </div>
  </div>

  <div class="box">
    <div class="small">
      This test scans Data Matrix, QR Code, Aztec, and Code 128.
      For the cryovial-cap test, first scan a Data Matrix containing <code>CS12341</code>.
    </div>

    <button onclick="startScanner()">Start Camera Scanner</button>
    <button class="secondary" onclick="stopScanner()">Stop Scanner</button>
  </div>

  <div class="box">
    <div id="reader"></div>
  </div>

  <div class="box">
    <div class="label">Scan result:</div>
    <div id="scanResult" class="result">No barcode scanned yet.</div>

    <div class="label">Detected format:</div>
    <div id="scanFormat" class="result">None yet.</div>
  </div>

  <div class="box">
    <div class="small">Technical log:</div>
    <div id="log" class="small"></div>
  </div>

  <script>
    let scanner = null;
    let scannerRunning = false;

    function writeLog(message) {
      const log = document.getElementById("log");
      const time = new Date().toLocaleTimeString();
      log.innerHTML += "[" + time + "] " + escapeHtml(message) + "<br>";
    }

    function runSystemCheck() {
      const systemCheck = document.getElementById("systemCheck");

      writeLog("URL: " + window.location.href);
      writeLog("Protocol: " + window.location.protocol);
      writeLog("Secure context: " + String(window.isSecureContext));
      writeLog("mediaDevices exists: " + String(!!navigator.mediaDevices));
      writeLog("getUserMedia exists: " + String(!!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)));
      writeLog("Html5Qrcode exists: " + String(typeof Html5Qrcode !== "undefined"));
      writeLog("Html5QrcodeSupportedFormats exists: " + String(typeof Html5QrcodeSupportedFormats !== "undefined"));
      writeLog("User agent: " + navigator.userAgent);

      if (window.location.protocol !== "https:") {
        systemCheck.innerHTML =
          '<div class="fail">FAIL: This page is not HTTPS.</div>' +
          '<div class="small">Camera access requires HTTPS.</div>';
        return;
      }

      if (!window.isSecureContext) {
        systemCheck.innerHTML =
          '<div class="fail">FAIL: Browser does not treat this page as secure.</div>';
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        systemCheck.innerHTML =
          '<div class="fail">FAIL: Browser camera API is not available.</div>' +
          '<div class="small">Use Safari on iPhone or Chrome on Android.</div>';
        return;
      }

      if (typeof Html5Qrcode === "undefined") {
        systemCheck.innerHTML =
          '<div class="fail">FAIL: scanner library did not load.</div>';
        return;
      }

      systemCheck.innerHTML =
        '<div class="pass">PASS: HTTPS and camera API are available.</div>' +
        '<div class="small">Next: press Start Camera Scanner and scan Data Matrix.</div>';
    }

    async function startScanner() {
      const result = document.getElementById("scanResult");
      const format = document.getElementById("scanFormat");

      result.textContent = "Starting camera...";
      format.textContent = "None yet.";

      writeLog("Start Camera Scanner pressed.");

      if (!scanner) {
        scanner = new Html5Qrcode("reader");
        writeLog("Scanner object created.");
      }

      let formats = null;

      if (typeof Html5QrcodeSupportedFormats !== "undefined") {
        formats = [
          Html5QrcodeSupportedFormats.DATA_MATRIX,
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.AZTEC,
          Html5QrcodeSupportedFormats.CODE_128
        ];
        writeLog("Configured supported formats: DATA_MATRIX, QR_CODE, AZTEC, CODE_128.");
      } else {
        writeLog("Html5QrcodeSupportedFormats unavailable. Scanner will use default formats.");
      }

      const config = {
        fps: 20,
        qrbox: function(viewfinderWidth, viewfinderHeight) {
          const minEdge = Math.min(viewfinderWidth, viewfinderHeight);
          const boxSize = Math.floor(minEdge * 0.65);
          return {
            width: boxSize,
            height: boxSize
          };
        },
        aspectRatio: 1.0,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: true
        }
      };

      if (formats) {
        config.formatsToSupport = formats;
      }

      try {
        await scanner.start(
          { facingMode: "environment" },
          config,
          function(decodedText, decodedResult) {
            const clean = String(decodedText || "").trim();

            result.textContent = clean;

            let detectedFormat = "Unknown";
            try {
              if (decodedResult && decodedResult.result && decodedResult.result.format) {
                detectedFormat = decodedResult.result.format.formatName || String(decodedResult.result.format);
              } else if (decodedResult && decodedResult.result && decodedResult.result.getBarcodeFormat) {
                detectedFormat = String(decodedResult.result.getBarcodeFormat());
              }
            } catch (e) {
              detectedFormat = "Detected, but format not reported";
            }

            format.textContent = detectedFormat;

            writeLog("BARCODE SCANNED: " + clean);
            writeLog("FORMAT: " + detectedFormat);

            stopScannerSilently();
          },
          function(errorMessage) {
            // Normal scan-search failures occur repeatedly. Do not log them.
          }
        );

        scannerRunning = true;
        result.textContent = "Camera is running. Point at Data Matrix.";
        writeLog("Camera started successfully.");

      } catch (err) {
        result.textContent = "FAIL: Camera/scanner could not start.";
        format.textContent = "None.";
        writeLog("Camera/scanner start error: " + String(err));
      }
    }

    async function stopScanner() {
      writeLog("Stop Scanner pressed.");

      if (!scanner || !scannerRunning) {
        document.getElementById("scanResult").textContent = "Scanner is not running.";
        return;
      }

      try {
        await scanner.stop();
        scannerRunning = false;
        document.getElementById("scanResult").textContent = "Scanner stopped.";
        writeLog("Scanner stopped successfully.");
      } catch (err) {
        writeLog("Stop scanner error: " + String(err));
      }
    }

    async function stopScannerSilently() {
      if (!scanner || !scannerRunning) {
        return;
      }

      try {
        await scanner.stop();
        scannerRunning = false;
        writeLog("Scanner stopped after successful scan.");
      } catch (err) {
        writeLog("Silent stop error: " + String(err));
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    runSystemCheck();
  </script>
</body>
</html>
